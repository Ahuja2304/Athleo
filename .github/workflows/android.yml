name: Build Android APK

on:
  push:
    #    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd AthleoMobile
          APP_VARIANT=production npx expo prebuild --platform android

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-Wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x AthleoMobile/android/gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > AthleoMobile/android/local.properties

      - name: Decode and setup keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > AthleoMobile/android/app/sparky-fitness-release-key.keystore
          echo "Keystore created at: $(pwd)/AthleoMobile/android/app/sparky-fitness-release-key.keystore"
          ls -la AthleoMobile/android/app/sparky-fitness-release-key.keystore

      - name: Run Gradle to generate codegen (will fail but generates files)
        run: |
          cd AthleoMobile/android
          ./gradlew :app:assembleDebug || true

      - name: Verify codegen was generated
        run: |
          if [ -d "AthleoMobile/node_modules/@react-native-async-storage/async-storage/android/build/generated/source/codegen/jni/" ]; then
            echo "✅ Codegen directory exists"
            ls -la AthleoMobile/node_modules/@react-native-async-storage/async-storage/android/build/generated/source/codegen/jni/
          else
            echo "❌ Codegen directory NOT found"
          fi

      - name: Build Release APK
        if: github.event_name != 'pull_request'
        run: |
          cd AthleoMobile/android
          ./gradlew :app:assembleRelease \
            -PMYAPP_RELEASE_STORE_FILE=${{ github.workspace }}/AthleoMobile/android/app/sparky-fitness-release-key.keystore \
            -PMYAPP_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -PMYAPP_RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }} \
            -PMYAPP_RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }} \
            --stacktrace

      - name: Get APK path
        if: github.event_name != 'pull_request'
        id: apk
        run: |
          APK_PATH=$(find AthleoMobile/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT

      - name: Build Release AAB
        if: github.event_name != 'pull_request'
        run: |
          cd AthleoMobile/android
          ./gradlew :app:bundleRelease \
            -PMYAPP_RELEASE_STORE_FILE=${{ github.workspace }}/AthleoMobile/android/app/sparky-fitness-release-key.keystore \
            -PMYAPP_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -PMYAPP_RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }} \
            -PMYAPP_RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }} \
            --stacktrace

      - name: Get AAB path
        if: github.event_name != 'pull_request'
        id: aab
        run: |
          AAB_PATH=$(find AthleoMobile/android/app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          echo "path=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "name=$(basename $AAB_PATH)" >> $GITHUB_OUTPUT

      - name: Get version from package.json
        if: github.event_name != 'pull_request'
        id: version
        run: |
          VERSION=$(node -p "require('./AthleoMobile/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.aab.outputs.path }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
